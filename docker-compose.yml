services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pgrag-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pgrag
    ports:
      - "5432:5432"
    volumes:
      - pgrag_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./app/backend
    container_name: pgrag-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./app/backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/pgrag
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./app/frontend
    container_name: pgrag-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgrag_data:
